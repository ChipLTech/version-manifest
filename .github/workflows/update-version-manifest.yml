name: Refresh Version Manifest

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: version-manifest-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: arc-runner-ci-router
    env:
      VERSION_MANIFEST_SOURCE_TOKEN: ${{ secrets.VERSION_MANIFEST_SOURCE_TOKEN }}
    steps:
      - name: Checkout manifest repository
        uses: actions/checkout@v5

      - name: Refresh latest commit manifest
        run: |
          set -euo pipefail

          if [ -z "${VERSION_MANIFEST_SOURCE_TOKEN}" ]; then
            echo "::error::Missing VERSION_MANIFEST_SOURCE_TOKEN repository secret."
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          tracked_repos = {
              "DLCsim": "main",
              "DLCSynapse": "main",
              "DLC-Kernel-Driver": "master",
              "DLC_CL": "inc_nsteps",
              "LLVM": "main",
              "DLC_Custom_Kernel": "develop",
              "pytorch": "release_25",
              "vllm": "update-v0.11.0",
          }

          token = os.environ["VERSION_MANIFEST_SOURCE_TOKEN"].strip()
          now = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          path = Path("check-version/latest.json")
          if path.exists():
              manifest = json.loads(path.read_text(encoding="utf-8"))
              if manifest.get("schema_version") != 1:
                  sys.exit(f"Unsupported manifest schema_version: {manifest.get('schema_version')}")
              if not isinstance(manifest.get("repos"), dict):
                  manifest["repos"] = {}
          else:
              manifest = {"schema_version": 1, "generated_at": now, "repos": {}}

          changed = False

          def github_json(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "ChipLTech-version-manifest-refresh",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      return json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"GitHub API request failed with HTTP {exc.code}: {body}") from exc

          for repo, branch in tracked_repos.items():
              url = f"https://api.github.com/repos/ChipLTech/{repo}/commits/{branch}"
              commit = github_json(url)
              sha = str(commit.get("sha", "")).strip().lower()
              if len(sha) != 40 or any(c not in "0123456789abcdef" for c in sha):
                  sys.exit(f"Invalid SHA returned for {repo}/{branch}: {sha}")

              previous = manifest["repos"].get(repo, {})
              entry = {
                  "ref_type": "branch",
                  "ref_name": branch,
                  "latest_sha": sha,
                  "updated_at": previous.get("updated_at", now),
              }
              if (
                  previous.get("ref_type") != "branch"
                  or previous.get("ref_name") != branch
                  or previous.get("latest_sha") != sha
              ):
                  entry["updated_at"] = now
                  changed = True
              manifest["repos"][repo] = entry

          stale_repos = set(manifest["repos"]) - set(tracked_repos)
          if stale_repos:
              for repo in stale_repos:
                  del manifest["repos"][repo]
              changed = True

          if changed:
              manifest["generated_at"] = now

          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Commit manifest update
        run: |
          git add check-version/latest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh version manifest"
          git push
